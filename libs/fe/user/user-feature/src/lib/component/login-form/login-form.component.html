<form [formGroup]="loginForm" (ngSubmit)="onLoginClick()" class="flex flex-col gap-6">
  <p-floatlabel variant="on">
    <input id="email" type="email" pInputText pSize="large" formControlName="email" fluid="true" />
    <label for="email">{{ 'user.email' | translate }}</label>
  </p-floatlabel>

  <p-floatlabel variant="on">
    <p-password
      id="password"
      size="large"
      inputId="password"
      formControlName="password"
      fluid="true"
      [feedback]="false"
      [toggleMask]="true"
    ></p-password>
    <label for="password">{{ 'user.password' | translate }}</label>
  </p-floatlabel>

  <p-button
    type="submit"
    fluid="true"
    size="large"
    [style]="{ height: '43px' }"
    [disabled]="loginForm.invalid || isLoading()"
  >
    @if (!isLoading()) {
    {{ 'user.login' | translate }}
    } @else {
    <i class="pi pi-spinner pi-spin"></i>
    }
  </p-button>

  <p-button
    [disabled]="isLoading()"
    (onClick)="newUserNavigation.emit()"
    type="button"
    [link]="true"
    class="p-button-link w-full text-center"
  >
    {{ 'user.create_account' | translate }}
  </p-button>
</form>
