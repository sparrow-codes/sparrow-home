<form [formGroup]="loginForm" (ngSubmit)="onLoginClick()" class="flex flex-col gap-6">
  <!-- E-mail -->
  <p-floatlabel class="fade-step" variant="on">
    <input id="email" type="email" pInputText pSize="large" formControlName="email" fluid="true" />
    <label for="email">E-mail</label>
  </p-floatlabel>

  <!-- Hasło -->
  <p-floatlabel class="fade-step" variant="on">
    <p-password
      id="password"
      size="large"
      inputId="password"
      formControlName="password"
      fluid="true"
      [feedback]="false"
      [toggleMask]="true"
    ></p-password>
    <label for="password">Hasło</label>
  </p-floatlabel>

  <!-- Przyciski -->
  <p-button type="submit" fluid="true" size="large" class="fade-step" [disabled]="loginForm.invalid"
    >Zaloguj się</p-button
  >

  <p-button
    (onClick)="newUserNavigation.emit()"
    type="button"
    [link]="true"
    class="p-button-link w-full text-center fade-step"
  >
    Utwórz nowe konto
  </p-button>
</form>
