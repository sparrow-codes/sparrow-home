<form [formGroup]="formGroup" class="w-full flex flex-col gap-6 animate-fadein">
  <p-floatlabel variant="on">
    <input pInputText id="firstName" fluid="true" pSize="large" type="text" [formControlName]="formName.FIRST_NAME" />
    <label for="firstName">{{ 'user.first_name' | translate }}*</label>
  </p-floatlabel>

  <p-floatlabel variant="on">
    <input pInputText id="lastName" fluid="true" pSize="large" type="text" [formControlName]="formName.LAST_NAME" />
    <label for="lastName">{{ 'user.last_name' | translate }}</label>
  </p-floatlabel>

  <p-floatlabel variant="on">
    <input pInputText id="email" fluid="true" pSize="large" type="email" [formControlName]="formName.EMAIL" />
    <label for="email">{{ 'user.email' | translate }}*</label>
  </p-floatlabel>

  <p-floatlabel variant="on">
    <p-password
      id="password"
      fluid="true"
      size="large"
      [feedback]="true"
      [toggleMask]="true"
      [formControlName]="formName.PASSWORD"
      [promptLabel]="'user.password_prompt' | translate"
      [weakLabel]="'user.password_weak' | translate"
      [mediumLabel]="'user.password_medium' | translate"
      [strongLabel]="'user.password_strong' | translate"
    ></p-password>
    <label for="password">{{ 'user.password' | translate }}*</label>
  </p-floatlabel>

  <p-floatlabel variant="on">
    <p-password
      id="repeatPassword"
      fluid="true"
      size="large"
      [feedback]="false"
      [toggleMask]="true"
      [formControlName]="formName.REPEAT_PASSWORD"
    ></p-password>
    <label for="repeatPassword">{{ 'user.repeat_password' | translate }}*</label>
  </p-floatlabel>

  <div class="min-h-[30px] flex items-center">
    @if (showMismatchPasswordError()) {
    <span class="text-error text-sm">{{ 'user.passwords_mismatch' | translate }}</span>
    }
  </div>

  <p-button fluid="true" size="large" [disabled]="formGroup.invalid" (onClick)="onSave()">
    {{ 'user.create_account' | translate }}
  </p-button>
</form>
