@if (user(); as user) {
  <div class="flex flex-col gap-4 w-full text-center py-7">
    <div class="flex justify-center">
      <ng-icon class="text-primary" name="heroUserCircleSolid" size="5rem"></ng-icon>
    </div>
    <div class="inline-block text-2xl">
      <span>{{user.firstName | uppercase}}</span>
      <span class="ml-2">{{user.lastName | uppercase}}</span>
    </div>
    <span class="font-light">{{user.email}}</span>
  </div>
}
