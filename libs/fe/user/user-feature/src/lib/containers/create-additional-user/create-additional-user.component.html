<div @staggeredFadeIn class="w-full h-full flex items-center justify-center bg-super-light-gray">
  <div class="w-[300px] md:w-[450px] bg-white p-6">
    <!-- Nagłówek -->
    <div class="flex flex-row justify-between items-center mb-6">
      <p-button
        (onClick)="navigateToLogin()"
        icon="pi pi-arrow-left"
        iconPos="left"
        [link]="true"
        size="small"
        class="ml-[-8px]"
        label="Wróć"
      >
      </p-button>
      <span class="text-md block font-semibold">Utwórz konto</span>
    </div>

    <!-- Formularz -->
    <sp-create-user-form (formSave)="dataService.createAdditionalUser($event)"></sp-create-user-form>

    <!-- Opis pod formularzem -->
    <span class="text-xs text-gray-500 mt-4 block fade-step">* pola wymagane</span>
  </div>
</div>
