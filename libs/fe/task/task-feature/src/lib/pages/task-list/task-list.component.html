<div class="w-full max-w-[360px] mx-auto flex flex-col h-full">
  <sp-page-title>Automatyka</sp-page-title>

  <div class="flex w-full justify-end">
    <p-button icon="pi pi-plus" label="Dodaj" size="large" severity="primary" [routerLink]="['new']"></p-button>
  </div>

  <span class="h-[45px]">Zadania: {{tasks().length}}</span>

  <div class="flex flex-col gap-2">
    @defer () {
      @for (task of tasks(); track task.id) {
        <sp-task-card @spFadeIn [task]="task" (isActive)="activateTask(task.id, $event)"></sp-task-card>
      }
    }

    @if (tasks().length === 0) {
      <p-divider></p-divider>
      <span class="w-full text-center">Brak zadań</span>
    }
  </div>
</div>
