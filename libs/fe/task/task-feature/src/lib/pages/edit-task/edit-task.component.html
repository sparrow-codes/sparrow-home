<sp-page-title [routerLink]="['../']">Edytuj zadanie</sp-page-title>

<div class="flex flex-col gap-2">
  <sp-schedule-settings
    [task]="task()"
    [devices]="devices()"
    [isLoading]="isLoading()"
    (taskChange)="onUpdateTask($event)"
  ></sp-schedule-settings>


  <p-divider></p-divider>

  <p-button
    label="Usuń"
    [outlined]="true"
    [fluid]="true"
    icon="pi pi-trash"
    (onClick)="deleteTask()"
    severity="danger"
    size="large"
  ></p-button>

</div>
