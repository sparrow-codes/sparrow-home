@if (formGroup) {

  <form [formGroup]="formGroup">
    <div class="flex flex-col gap-4">
      <p-float-label variant="on">
        <input pInputText id="name" type="text" pSize="large" formControlName="name" fluid="true" />
        <label for="name">Nazwa</label>
      </p-float-label>

      <div class="flex justify-end">
        <p-button [buttonProps]="{styleClass: 'h-[40px]'}" [outlined]="true" icon="pi pi-plus"
                  (onClick)="onAddAction()"></p-button>
      </div>

      <p-data-view class="min-h-[90%]" [value]="sortedActions()" [paginator]="true" [rows]="2"
                   [emptyMessage]="'Brak akcji'">
        <ng-template #list let-items>
          @for (item of items; track item.zigbeeDeviceId; let index = $index) {

            <div @sparrowFadeIn class="mb-2">
              <p-panel>
                <ng-template pTemplate="header">
                  <div class="flex justify-between items-center w-full">
                    <span class="font-semibold">{{ item.deviceName }}</span>
                    <p-tag [severity]="'info'">
                      <div class="flex gap-2">
                        <i class="pi pi-clock"></i>
                        {{ item.executionTime | date : 'HH:mm' }}
                      </div>
                    </p-tag>
                  </div>
                </ng-template>
                <div class="flex flex-col gap-3">
                  <!--            <span class="text-sm">{{ item.deviceDescription }}</span>-->
                  <sp-device-action [action]="item.action"
                                    (callAction)="onActionChange(index, $event)"></sp-device-action>
                  <div class="flex gap-2">
                    <p-button [buttonProps]="{styleClass: 'h-[40px]'}" icon="pi pi-trash" severity="danger" (onClick)="onDeleteAction(index)"></p-button>
                    <p-button [buttonProps]="{styleClass: 'h-[40px]'}" icon="pi pi-pencil" outlined="true" (onClick)="onEditAction(item)"></p-button>
                  </div>
                </div>
              </p-panel>
            </div>

          }
        </ng-template>
      </p-data-view>
    </div>
  </form>

  <div class="flex flex-row sm:flex-row justify-end gap-4 fade-step">
    <p-button
      [disabled]="formGroup.invalid"
      label="Zapisz"
      icon="pi pi-check"
      (onClick)="onSubmitPreferences()"
      severity="primary"
      size="large"
    ></p-button>
  </div>
}
