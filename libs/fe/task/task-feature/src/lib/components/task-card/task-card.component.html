<p-card>
  <div class="flex justify-between items-center w-full">
    <a
      class="flex flex-row items-center gap-4 cursor-pointer hover:bg-gray-50 rounded no-underline text-inherit focus:outline-none focus-visible:ring-2 focus-visible:ring-primary"
      [routerLink]="['edit', task().id]"
      [attr.aria-label]="'Przejdź do szczegółów urządzenia ' + task().id"
    >

      <div class="w-10 h-10 bg-gray-700 rounded-md flex items-center justify-center text-white">
        <i class="pi pi-bolt"></i>
      </div>

      <div class="font-semibold text-gray-700 uppercase">{{ task().name }}</div>
    </a>

    <p-toggle-switch [ngModel]="task().isActive" (onChange)="isActive.emit($event.checked)"></p-toggle-switch>
  </div>
</p-card>
