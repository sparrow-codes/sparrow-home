<a
  class="animate-fadein flex items-center justify-between bg-white rounded-xl shadow-sm px-4 py-3 w-full cursor-pointer hover:bg-gray-50 transition no-underline"
  [routerLink]="['edit', task().id]"
  [attr.aria-label]="('tasks.go_to_device_details' | translate) + task().id"
>
  <div class="flex items-center gap-3">
    <div class="w-[50px] h-[50px] bg-gray-700 rounded-md flex items-center justify-center text-white">
      @if (showFinishAnimation()) {
      <sp-animated-check-circle width="32px" height="32px"></sp-animated-check-circle>
      } @else {
      <i class="pi pi-bolt animate-fadein" style="font-size: 32px"></i>
      }
    </div>
    <div class="block">
      <div class="font-semibold text-gray-700 mb-2 max-w-[45vw] truncate">{{ task().name }}</div>

      @if (task().isActive) {
      <p-tag severity="success">{{ 'tasks.active' | translate }}</p-tag>
      } @else {
      <p-tag severity="secondary">{{ 'tasks.inactive' | translate }}</p-tag>
      }
    </div>
  </div>

  <p-toggle-switch
    (click)="$event.stopPropagation(); $event.preventDefault()"
    [ngModel]="task().isActive"
    (onChange)="changeTaskStatus($event.checked)"
  ></p-toggle-switch>
</a>
