<form [formGroup]="form">
  <div class="flex flex-col gap-4 mb-8">
    <p-float-label variant="on" class="mt-2">
      <p-select
        inputId="device"
        [formControl]="form.controls.device"
        [options]="devices()"
        optionLabel="name"
        optionValue="id"
        [fluid]="true"
        size="large"
      ></p-select>
      <label for="device">{{ 'tasks.device' | translate }}</label>
    </p-float-label>

    <p-float-label variant="on">
      <p-select
        inputId="action"
        [formControl]="form.controls.action"
        [fluid]="true"
        [options]="actionOptions()"
        optionLabel="key"
        optionValue="value"
        size="large"
      ></p-select>
      <label for="action">{{ 'tasks.action' | translate }}</label>
    </p-float-label>

    <div class="min-h-[50px]">
      @if (selectedAction(); as action) {
        <sp-device-action class="animate-fadein" [action]="action" [formControl]="form.controls.payload"></sp-device-action>
      }
    </div>

    <p-float-label variant="on">
      <p-datePicker
        inputId="time"
        [timeOnly]="true"
        hourFormat="24"
        [showClear]="true"
        [formControl]="form.controls.time"
        size="large"
        showIcon="true"
        iconDisplay="input"
      ></p-datePicker>
      <label for="time">{{ 'tasks.time' | translate }}</label>
    </p-float-label>
  </div>

    <sp-days-of-week-control [formControl]="form.controls.daysOfWeek" [notDefinedLabel]="'tasks.default' | translate"></sp-days-of-week-control>
</form>

<div class="w-full flex justify-end mt-4">
  <p-button severity="primary" size="large" [disabled]="form.invalid" (onClick)="save()">{{ 'common.save' | translate }}</p-button>
</div>
