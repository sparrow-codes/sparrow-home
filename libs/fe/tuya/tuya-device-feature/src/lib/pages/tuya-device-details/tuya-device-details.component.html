@if (deviceDetails(); as tuyaDevice) {
  <sp-page-title [routerLink]="['/main']">Sczegóły {{tuyaDevice.name}}</sp-page-title>

  <mat-card>
    <mat-card-content>
      <div class="flex flex-col gap-2 max-w-[500px]">
        <div class="flex w-full py-2 justify-between">
          <div>Typ urządzenia:</div>
          <sp-device-type [deviceType]="tuyaDevice.type"></sp-device-type>
        </div>

        <mat-divider></mat-divider>
        <div class="flex w-full py-2 justify-between">
          <div>Identyfikator Tuya:</div>
          <div class="font-semibold">{{ tuyaDevice.tuyaDeviceId }}</div>
        </div>

        <mat-divider></mat-divider>
        <div class="flex w-full py-2 justify-between">
          <div>Nazwa własna:</div>
          <div class="font-semibold">{{ tuyaDevice.name }}</div>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
}
