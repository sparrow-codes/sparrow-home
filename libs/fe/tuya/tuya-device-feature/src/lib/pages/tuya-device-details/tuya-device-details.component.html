@if (deviceDetails(); as tuyaDevice) {
  <sp-page-title @sparrowFadeIn [routerLink]="['/main']">{{ tuyaDevice.name }}</sp-page-title>

  <mat-card @sparrowFadeIn>
    <mat-card-content>
      <div class="flex flex-col gap-2 max-w-[500px]">
        <div class="flex w-full py-2 justify-between">
          <div>Typ urządzenia:</div>
          <sp-device-type [deviceType]="tuyaDevice.type"></sp-device-type>
        </div>

        <mat-divider></mat-divider>
        <div class="flex w-full py-2 justify-between">
          <div>Identyfikator Tuya:</div>
          <div class="font-semibold">{{ tuyaDevice.tuyaDeviceId }}</div>
        </div>

        <mat-divider></mat-divider>
        <div class="flex w-full py-2 justify-between">
          <div>Nazwa własna:</div>
          <div class="font-semibold">{{ tuyaDevice.name }}</div>
        </div>

        <mat-divider></mat-divider>
        <div class="flex w-full py-2 justify-between">
          <div>Status:</div>
          <div class="flex gap-2 items-center">
            @if (tuyaDevice.isOnline) {
              <span>Online</span>
              <ng-icon class="text-success" name="heroCheckCircleSolid"></ng-icon>
            } @else {
              <span>Offline</span>
              <ng-icon name="heroNoSymbol"></ng-icon>
            }
          </div>
        </div>
      </div>

      <mat-divider class="py-4 mt-4"></mat-divider>
      <div class="mb-4">
        <ng-icon name="heroAdjustmentsHorizontal" size="24px"></ng-icon>
      </div>
      @if (lcsSwitch(); as lcsSwitch) {
        <sp-lcs-switch-manual-control [lcsSwitch]="lcsSwitch" (switchChange)="onLscSwitchChange($event)"></sp-lcs-switch-manual-control>
      }

    </mat-card-content>
  </mat-card>
}
