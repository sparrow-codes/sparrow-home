<sp-page-title>Dostępne urząrzenia w domu:</sp-page-title>

@if (data(); as data) {
  <div class="flex justify-between">
    <div class="flex gap-6">
        <mat-form-field>
          <mat-label>Wyszukaj</mat-label>
          <input matInput placeholder="Wyszukaj po nazwie..." [formControl]="searchControl">
          <ng-icon name="heroMagnifyingGlass" matSuffix class="px-4"></ng-icon>
      </mat-form-field>
    </div>

    <button mat-stroked-button (click)="onAddClick()">
      <div class="flex gap-2 items-center">
        <ng-icon [size]="'24px'" name="heroPlusCircle"></ng-icon>
        <span>Dodaj</span>
      </div>
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="data">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>Id.</th>
          <td mat-cell *matCellDef="let element">{{element.id}}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Typ</th>
          <td mat-cell *matCellDef="let element" class="max-w-[124px]">
            <sp-device-type [deviceType]="element.type"></sp-device-type>
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nazwa</th>
          <td mat-cell *matCellDef="let element">{{element.name}}</td>
        </ng-container>

        <ng-container matColumnDef="tuyaDeviceId">
          <th mat-header-cell *matHeaderCellDef>Identyfikator Tuya</th>
          <td mat-cell *matCellDef="let element">{{element.tuyaDeviceId}}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>


<!--        <tr-->
<!--          mat-row-->
<!--          (click)="clickedRows.add(row)"-->
<!--          [class.demo-row-is-clicked]="clickedRows.has(row)"-->
<!--          *matRowDef="let row; columns: displayedColumns;"-->
<!--        ></tr>-->
      </table>

      <div class="w-full mt-4">
        <span class="text-sm">Liczba urządzeń: {{data.length}}</span>
      </div>

      @if (data.length === 0) {
        <div class="w-full text-center">
          <span class="text-sm">Nie znaleziono wyników</span>
        </div>
      }
    </mat-card-content>
  </mat-card>
}
