<div mat-dialog-title>{{data.title}}</div>

<mat-dialog-content>
  {{data.content}}
</mat-dialog-content>

<mat-dialog-actions [align]="'end'">
  <div class="flex gap-4">
    <button mat-button mat-dialog-close>Anuluj</button>
    <button mat-stroked-button (click)="onConfirm()">Ok</button>
  </div>
</mat-dialog-actions>
