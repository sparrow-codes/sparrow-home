<div class="min-h-screen">
  <main class="overflow-y-auto   px-4 pt-4 pb-[calc(5.5rem+var(--safe-bottom))]">
    <router-outlet></router-outlet>
  </main>
  <nav
    class="pb-[var(--safe-bottom)] fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-solid border-r-0 border-l-0 shadow-[0_-1px_8px_rgba(0,0,0,0.06)] border-gray-200"
    role="navigation"
    aria-label="Primary"
  >
    <div class="flex h-16">
      @for (item of navigationItems; track item.routerLink) {
        <a
          class="flex-1 flex flex-col items-center justify-center gap-1 transition-colors no-underline"
          [class.text-gray-500]="currentUrl() !== '/' + item.routerLink"
          [class.text-primary]="currentUrl() === '/' + item.routerLink"
          [routerLink]="item.routerLink"
          [attr.aria-current]="currentUrl() === '/' + item.routerLink ? 'page' : null"
        >
          <i [class]="item.icon"></i>
          <span class="text-md leading-none">{{ item.label }}</span>
        </a>
      }
    </div>
  </nav>
</div>
