<ion-header></ion-header>
<ion-content class="ion-padding">
  <router-outlet></router-outlet>
</ion-content>
<ion-tab-bar slot="bottom" class="bg-nav-background">
  @for (item of navigationItems; track item.routerLink) {
  <ion-tab-button
    class="transition-colors"
    [class.text-gray-500]="currentUrl() !== '/' + item.routerLink"
    [class.text-black]="currentUrl() === '/' + item.routerLink"
    [routerLink]="item.routerLink"
    [selected]="currentUrl() === '/' + item.routerLink"
  >
    <i size="1.5rem" [class]="item.icon" class="text-[32px]"></i>
    <span class="text-sm">{{ item.label }}</span>

  </ion-tab-button>
  }
</ion-tab-bar>
