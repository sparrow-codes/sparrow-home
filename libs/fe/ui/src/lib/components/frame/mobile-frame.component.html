<ion-header></ion-header>
<ion-content class="ion-padding">
  <router-outlet></router-outlet>
</ion-content>
<ion-tab-bar slot="bottom" class="bg-nav-background">
  @for (item of navigationItems; track item.routerLink) {
  <ion-tab-button
    class="transition-colors"
    [class.text-nav-icon-inactive]="currentUrl() !== '/' + item.routerLink"
    [class.text-nav-icon-active]="currentUrl() === '/' + item.routerLink"
    [routerLink]="item.routerLink"
    [selected]="currentUrl() === '/' + item.routerLink"
    [routerDirection]="'back'"
  >
    <ng-icon size="1.5rem" [name]="item.icon"></ng-icon>
    {{ item.label }}
  </ion-tab-button>
  }
</ion-tab-bar>
