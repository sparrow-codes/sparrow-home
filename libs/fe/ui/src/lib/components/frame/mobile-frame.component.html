<ion-header>
  <ion-toolbar class="my-custom-color ion-no-padding">
    <div class="max-h-[60px] flex justify-between items-center">
      <sp-app-logo></sp-app-logo>
      <button mat-button [matMenuTriggerFor]="menu">
        <span class="text-white"><ng-icon name="matSettings" size="1.5rem"></ng-icon></span>
      </button>

      <mat-menu #menu="matMenu">
        <button mat-menu-item [routerLink]="profilePath">PROFIL</button>
        <button mat-menu-item [routerLink]="loginPath">WYLOGUJ</button>
      </mat-menu>
    </div>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <router-outlet></router-outlet>
</ion-content>
<ion-tab-bar slot="bottom">
  @for (item of navigationItems; track item.routerLink) {
  <ion-tab-button
    [class.text-primary]="currentUrl() === '/' + item.routerLink"
    [routerLink]="item.routerLink"
    [selected]="currentUrl() === '/' + item.routerLink"
    [routerDirection]="'back'"
  >
    <ng-icon size="1.5rem" [name]="item.icon"></ng-icon>
    {{ item.label }}
  </ion-tab-button>
  }
</ion-tab-bar>
