<svg
  xmlns="http://www.w3.org/2000/svg"
  class="svg-success"
  [ngStyle]="{ width: width(), height: height() }"
  viewBox="0 0 24 24"
>
  <g stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10">
    <circle class="success-circle-outline stroke-white" cx="12" cy="12" r="11.5" />
    <circle class="success-circle-fill fill-transparent" cx="12" cy="12" r="11.5" />
    <polyline class="success-tick stroke-white" points="17,8.5 9.5,15.5 7,13" />
  </g>
</svg>
