<div class="inline-block">
  <i class="pi pi-calendar mr-2"></i>
  <span>{{ 'ui.days_of_week_label' | translate }}</span>
</div>
<p-divider></p-divider>
<div class="flex flex-col gap-4 mt-2">
  <div class="flex items-center">
    <p-radio-button name="daysOfTheWeek" [formControl]="areAllDays" [value]="true"  inputId="all" />
    <label for="all" class="ml-2">{{ 'ui.all_days' | translate }}</label>
  </div>

  <div class="flex items-center">
    <p-radio-button name="daysOfTheWeek" [formControl]="areAllDays" [value]="false" inputId="custom" />
    <label for="custom" class="ml-2">{{ 'ui.define' | translate }}</label>
  </div>
</div>

@if (value()) {
  <p-divider></p-divider>

  <div class="grid grid-cols-4 mt-2 gap-4">
    <div class="inline-block">
      <p-check-box [value]="1" inputId="mon" [formControl]="daysOfWeek"></p-check-box>
      <label class="ml-2" for="mon">{{ 'ui.days.mon' | translate }}</label>
    </div>

    <div class="inline-block">
      <p-check-box [value]="2" inputId="tue" [formControl]="daysOfWeek"></p-check-box>
      <label class="ml-2" for="tue">{{ 'ui.days.tue' | translate }}</label>
    </div>

    <div class="inline-block">
      <p-check-box [value]="3" inputId="wed" [formControl]="daysOfWeek"></p-check-box>
      <label class="ml-2" for="wed">{{ 'ui.days.wed' | translate }}</label>
    </div>

    <div class="inline-block">
      <p-check-box [value]="4" inputId="thu" [formControl]="daysOfWeek"></p-check-box>
      <label class="ml-2" for="thu">{{ 'ui.days.thu' | translate }}</label>
    </div>

    <div class="inline-block">
      <p-check-box [value]="5" inputId="fri" [formControl]="daysOfWeek"></p-check-box>
      <label class="ml-2" for="fri">{{ 'ui.days.fri' | translate }}</label>
    </div>

    <div class="inline-block">
      <p-check-box [value]="6" inputId="sat" [formControl]="daysOfWeek"></p-check-box>
      <label class="ml-2" for="sat">{{ 'ui.days.sat' | translate }}</label>
    </div>

    <div class="inline-block">
      <p-check-box [value]="0" inputId="sun" [formControl]="daysOfWeek"></p-check-box>
      <label class="ml-2" for="sun">{{ 'ui.days.sun' | translate }}</label>
    </div>
  </div>
}
