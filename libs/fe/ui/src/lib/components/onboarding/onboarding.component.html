<div class="flex flex-col gap-2 animate-fadein">
  <div class="w-full text-center p-4">
    <ng-content></ng-content>
  </div>
  <span class="w-full text-center text-2xl">{{ title() }}</span>
  <span class="text-center text-gray-800 mb-2">{{ description() }}</span>
  <p-button
    class="text-center"
    [label]="buttonLabel()"
    size="large"
    severity="primary"
    [routerLink]="buttonRouterLink()"
  ></p-button>
  @if (content()) {
    <p-divider></p-divider>
    <span class="text-center text-gray-600 text-sm">{{ content() }}</span>
  }
</div>
