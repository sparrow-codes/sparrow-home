<mat-sidenav-container hasBackdrop="true" class="h-full" autosize>
  <mat-sidenav #drawer mode="over" (click)="drawer.toggle()" class="bg-dark-blue max-w-[75%]">
    <div class="flex h-[90vh] gap-5 flex-col p-4 bg-dark-blue mb-2">
      <div class="flex items-end mb-5">
        <sp-app-logo></sp-app-logo>
      </div>
      @for (item of navigationItems(); track item.routerLink) {
        <sp-nav-item [currentUrl]="currentUrl()" [navItem]="item"></sp-nav-item>
      }
      <mat-divider></mat-divider>
      <sp-nav-item [navItem]="{label: 'Wyloguj', icon: 'heroArrowLeftEndOnRectangleSolid', routerLink: routePath.LOGIN }"></sp-nav-item>
    </div>
    <span class="p-4 text-sm mt-2 font-light">Sparrow Codes {{today | date: 'yyyy'}}</span>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="flex h-full w-full">
      <div class="flex flex-col w-full bg-super-light-gray">
        <sp-app-header (openLeftMenu)="drawer.toggle()" [currentUrl]="currentUrl() ?? ''"
                       [navigationItems]="navigationItems()" (logout)="logout.emit()"></sp-app-header>

        <div class="p-4 px-4 md:px-12 overflow-auto">
          <ng-content></ng-content>
        </div>
      </div>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
