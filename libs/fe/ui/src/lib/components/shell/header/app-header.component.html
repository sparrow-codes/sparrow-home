<header class="flex items-center px-4 justify-between bg-dark-blue h-[60px] shadow-sm">
  <div class="text-white uppercase text-xl font-light">
    <span class="mt-4">
      <sp-app-logo></sp-app-logo>
    </span>

  </div>
  <div class="md:flex gap-2 items-center hidden">
    @for (item of navigationItems(); track $index) {
      <sp-nav-item [currentUrl]="currentUrl()" [navItem]="item"></sp-nav-item>
    }
  </div>
  <div class="flex items-center">
    <div class="md:hidden">
      <button mat-button (click)="openLeftMenu.emit()">
        <ng-icon class="text-lg text-white" name="heroBars3Solid"></ng-icon>
      </button>
    </div>

    <div class="hidden md:block">
      <button mat-button (click)="logout.emit()">
        <div class="flex gap-2 items-center">
          <span class="text-white">WYLOGUJ</span>
          <ng-icon class="text-lg text-white" name="heroArrowLeftEndOnRectangleSolid"></ng-icon>
        </div>
      </button>
    </div>

  </div>
</header>
