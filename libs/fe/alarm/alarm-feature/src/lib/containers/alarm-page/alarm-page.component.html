<sp-page-title @sparrowFadeIn>
  <div class="flex justify-between items-center w-full">
    <span>Alarm</span>
    <button (click)="openSosDialog()" mat-stroked-button><span class="text-error">SOS</span></button>
  </div>
</sp-page-title>

<mat-card @sparrowFadeIn>
  <mat-card-header class="flex justify-between items-center">
    <div class="w-full flex items-center gap-2">
      Stan:
      @if (isActive()) {
        <ng-icon class="text-success" name="heroCheckCircleSolid"></ng-icon>
      } @else {
        <ng-icon name="heroNoSymbol"></ng-icon>
      }
    </div>
    <mat-slide-toggle (change)="handleToggleChange($event.checked)" [checked]="isActive()"></mat-slide-toggle>
  </mat-card-header>
</mat-card>
