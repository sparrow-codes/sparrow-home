@if (formGroup) {
  <p-card @staggeredFadeIn>
    <div class="flex w-full justify-between items-center fade-step">
      <span class="text-base font-semibold">{{ header() }}</span>
      <p-toggle-switch
        [ngModel]="schedulePreferences().isActive"
        (ngModelChange)="activated.emit($event)"
        [disabled]="!canScheduleBeActivated() || formGroup.enabled"
      ></p-toggle-switch>
    </div>

    <div [formGroup]="formGroup" class="flex flex-col gap-6 py-4">
      <div class="flex flex-col sm:flex-row gap-6">
        <p-float-label variant="on" class="fade-step">
          <p-datePicker
            inputId="from-time"
            [timeOnly]="true"
            hourFormat="24"
            [formControlName]="formName.FROM"
            showIcon="true"
            iconDisplay="input"
          ></p-datePicker>
          <label for="from-time">Od</label>
        </p-float-label>


        <p-float-label variant="on" class="fade-step">
          <p-datePicker
            inputId="to-time"
            [timeOnly]="true"
            hourFormat="24"
            [formControlName]="formName.TO"
            showIcon="true"
            iconDisplay="input"
          ></p-datePicker>
          <label for="to-time">Do</label>
        </p-float-label>

      </div>

      <p-float-label variant="on" class="fade-step">
        <p-select
          inputId="home-device"
          class="w-full"
          [options]="homeDeviceOptions()"
          [formControlName]="formName.HOME_DEVICE"
          optionLabel="label"
          optionValue="value"
          emptyMessage="Brak dostępnych urządzeń"
        ></p-select>
        <label for="home-device">Gniazdko</label>
      </p-float-label>


      @if (toControl?.touched && toControl?.invalid) {
        <small class="text-error">Nieprawidłowy zakres czasu!</small>
      }
    </div>

    <div class="flex flex-row sm:flex-row justify-end gap-4 fade-step">
      @if (formGroup.disabled) {
        <p-button label="Edytuj" (onClick)="editMode()" size="large"></p-button>
      } @else {
        <p-button label="Anuluj" (onClick)="readonlyMode()" severity="secondary" size="large"></p-button>
        <p-button label="Zapisz" (onClick)="onSubmitPreferences()" severity="primary" size="large"></p-button>
      }
    </div>

  </p-card>
}
