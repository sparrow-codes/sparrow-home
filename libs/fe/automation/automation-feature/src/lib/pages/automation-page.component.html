<div class="flex flex-col gap-4 pt-6">
  <p-carousel
    @sparrowFadeIn
    [value]="carouselItems"
    [numVisible]="1"
    [numScroll]="1"
    [circular]="false"
    [showIndicators]="false"
    [showNavigators]="true"
    contentClass="rounded-lg overflow-hidden"
  >
    <ng-template pTemplate="item" let-item>
      <div class="w-full relative">
        <img [src]="item.image" [alt]="item.label" class="w-full h-[180px] object-cover rounded-lg shadow" />
        <div class="absolute top-4  bg-white/80 backdrop-blur px-4 py-2 rounded-r text-sm font-medium text-gray-700">{{ item.label | uppercase }}</div>
      </div>
    </ng-template>
  </p-carousel>

  @if (aquaPreferences(); as aquaPreferences) {
    @if (homeDeviceOptions()?.length) {
      <sp-aquarium-light-settings
        [aquaPreferences]="aquaPreferences"
        [homeDeviceOptions]="homeDeviceOptions() ?? []"
        (activated)="onAquaScheduleActive($event)"
        (preferencesUpdates)="onAquaPreferencesUpdate($event)"
      ></sp-aquarium-light-settings>
    }
  }
</div>
