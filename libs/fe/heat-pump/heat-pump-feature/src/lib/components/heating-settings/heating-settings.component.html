@if (form) {
<mat-card [formGroup]="form">
  <mat-card-header>
    <span mat-card-title>automatyczne ogrzewanie</span>

    <div class="flex justify-end">
      <mat-slide-toggle [checked]="heatingPreferences().isAutomaticHeat" (change)="activated.emit($event.checked)" [disabled]="!canBeActivated() || form.enabled"></mat-slide-toggle>
    </div>
  </mat-card-header>
  <mat-card-content>
    <div class="w-full flex justify-end">
      <button [disabled]="form.disabled" mat-button class="mb-1" (click)="clearForm()">
        <ng-icon name="heroTrash" size="1rem"></ng-icon>
      </button>
    </div>

    <div class="flex flex-col gap-3">
      <mat-form-field class="sm:max-w-[200px]">
        <mat-label>Czujnik parter</mat-label>
        <mat-select [formControlName]="formNames.GROUND_FLOR_SENSOR_ID">
          @for (sensor of sensorOptions(); track sensor.value) {
          <mat-option [value]="sensor.value">{{ sensor.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field class="sm:max-w-[200px]">
        <mat-label>Czujnik na piętrze</mat-label>
        <mat-select [formControlName]="formNames.FIRST_FLOR_SENSOR_ID">
          @for (sensor of sensorOptions(); track sensor.value) {
            <mat-option [value]="sensor.value">{{ sensor.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <span class="text-sm">TEMPERATURA:</span>

      <div class="flex gap-4">
        <mat-form-field>
          <mat-label>Min</mat-label>
          <input matInput mask="separator.1" [suffix]="' &#176;C'" [formControlName]="formNames.MINIMUM_TEMPERATURE" />
        </mat-form-field>

        <mat-form-field>
          <mat-label>Max</mat-label>
          <input matInput mask="separator.1" [suffix]="' &#176;C'" [formControlName]="formNames.MAXIMUM_TEMPERATURE" />
        </mat-form-field>
      </div>
    </div>
  </mat-card-content>
  <mat-card-actions [align]="'end'">
    @if (form.disabled) {
    <button class="w-[120px]" (click)="form.enable()" mat-stroked-button>
      <div class="flex gap-2">
        <span>Edytuj</span>
        <ng-icon size="1rem" name="heroPencil"></ng-icon>
      </div>
    </button>
    } @else {
    <button class="mr-4" (click)="onDiscard()" mat-button>Anuluj</button>

    <button class="w-[120px]" (click)="onSubmit()" mat-stroked-button>
      <div class="flex gap-2">
        <span>Zapisz</span>
        <ng-icon size="1rem" name="heroCheck"></ng-icon>
      </div>
    </button>
    }
  </mat-card-actions>
</mat-card>
}
