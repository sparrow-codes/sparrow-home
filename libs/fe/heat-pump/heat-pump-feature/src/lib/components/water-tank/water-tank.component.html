@if(waterTank(); as waterTank) {

  <div class="flex gap-2 mt-2 items-center mb-6">
    <span>Status:</span>
    @if (waterTank.operationStatus === 1) {
      <ng-icon class="text-success" name="heroCheckCircleSolid"></ng-icon>
    } @else {
      <ng-icon name="heroNoSymbol"></ng-icon>
    }
  </div>

  <div class="flex flex-col gap-4 w-full md:w-[400px]">
    <div class="w-full flex gap-4 items-center justify-between">
      <div class="font-semibold">Temperatura wody</div>
      <div class="text-nowrap font-semibold">{{ waterTank.currentTemperature }} &#176;C</div>
    </div>

    <div class="w-full flex gap-4 items-center justify-between">
      <div>Wybrana temperatura</div>
      <div class="text-nowrap">{{ waterTank.heatSet }} &#176;C</div>
    </div>
  </div>

  <form [formGroup]="formGroup" class="mt-8 flex justify-end gap-2 items-center">
      <span class="uppercase text-sm">Automatyczne grzanie wody</span>
      <mat-slide-toggle [formControlName]="formName.SCHEDULE_WATER_HEATING"></mat-slide-toggle>
  </form>
}
