<div class="flex gap-2 mt-2 items-center mb-6">
  <span>Status:</span>
  @if (heatTank().operationStatus === 1) {
    <ng-icon class="text-success" name="heroCheckCircleSolid"></ng-icon>
  } @else {
    <ng-icon name="heroNoSymbol"></ng-icon>
  }
</div>

<div class="flex flex-col gap-4 w-full md:w-[400px]">
  <div class="w-full flex gap-4 items-center justify-between">
    <div class="font-semibold">Temperatura Kotła</div>
    <div class="text-nowrap font-semibold">{{ heatTank().currentTemperature }} &#176;C</div>
  </div>

  <div class="w-full flex gap-4 items-center justify-between">
    <span>Korekta temperatury:</span>
    <span class="text-nowrap">{{ heatTank().heatSet }} &#176;C</span>
  </div>
</div>
