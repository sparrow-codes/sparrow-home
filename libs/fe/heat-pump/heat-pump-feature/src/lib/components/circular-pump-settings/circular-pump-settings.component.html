@if (formGroup) {
  <mat-card>
    <mat-card-header>
      <div class="flex w-full justify-between items-center">
        <span>pompa cyrculacyjna</span>
        <mat-slide-toggle
          (change)="activated.emit($event.checked)"
          [checked]="circularPumpPreferences().isActive"
          [disabled]="!canScheduleBeActivated() || formGroup.enabled"
        >
          <span class="hidden md:block">Włącz/Wyłącz</span>
        </mat-slide-toggle>
      </div>
    </mat-card-header>

    <mat-card-content [formGroup]="formGroup">
      <mat-form-field class="mt-4 mb-6 sm:mb-4 w-full sm:w-[unset]">
        <mat-label>Urządzenie:</mat-label>
        <mat-select [formControlName]="formName.HOME_DEVICE">
          <mat-option>Brak</mat-option>
          @for (option of homeDeviceOptions(); track option.value) {
            <mat-option [value]="option.value">{{option.label}}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <div class="flex gap-4 items-center">
        <mat-form-field>
          <mat-label>Start:</mat-label>
          <input matInput [matTimepicker]="fromPicker" [formControlName]="formName.FROM" />
          <mat-timepicker-toggle matIconSuffix [for]="fromPicker"/>
          <mat-timepicker interval="15min" #fromPicker />
        </mat-form-field>
        <mat-form-field>
          <mat-label>Stop:</mat-label>
          <input matInput [matTimepicker]="toPicker" [formControlName]="formName.TO" />
          <mat-timepicker-toggle matIconSuffix [for]="toPicker"/>
          <mat-timepicker interval="15min" #toPicker />
          @if (toControl?.touched && toControl?.invalid) {
            <mat-error>Nieprawidłowy zakres czasu!</mat-error>
          }
        </mat-form-field>
      </div>
    </mat-card-content>

    <mat-card-actions [align]="'end'" class="gap-4">
      @if (formGroup.disabled) {
        <button (click)="editMode()" mat-stroked-button>Edytuj</button>
      } @else {
        <button (click)="readonlyMode()" mat-button>Anuluj</button>
        <button (click)="onSubmitPreferences()" mat-stroked-button>Zapisz</button>
      }
    </mat-card-actions>
  </mat-card>
}
