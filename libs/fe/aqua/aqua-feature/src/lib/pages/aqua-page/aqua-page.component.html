<sp-page-title @sparrowFadeIn>Akwarium</sp-page-title>

@if (aquaPreferences(); as aquaPreferences) {
  <sp-aquarium-light-settings @sparrowFadeIn
    [aquaPreferences]="aquaPreferences"
    [tuyaDeviceOptions]="tuyaDeviceOptions() ?? []"
    (activated)="onScheduleChanged($event)"
    (preferencesUpdates)="onPreferenceChanged($event)"
  ></sp-aquarium-light-settings>
}
