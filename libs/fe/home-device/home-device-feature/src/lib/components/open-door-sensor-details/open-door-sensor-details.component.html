@if (openDoorSensor().battery; as battery) {
  <sp-battery-status [batteryStatus]="battery"></sp-battery-status>
}


<div class="w-full mt-4">
  <mat-divider></mat-divider>
</div>

<div class="flex w-full py-2 justify-between flex-wrap">
  <div>Stan:</div>
  <div class="font-semibold">{{openDoorSensor().isOpen ? 'Otwarte' : 'Zamknięte'}}</div>
</div>

<div class="flex w-full py-2 justify-between flex-wrap">
  <div>Ostatnio otwarte:</div>
  @if (openDoorSensor().lastOpened) {
    <div>{{openDoorSensor().lastOpened | date: 'dd.MM.yyyy HH:mm'}}</div>
  } @else {
    <div>-</div>
  }

</div>
