<div class="flex gap-2 items-center">
  <ng-icon name="heroWifi" size="1.85rem"></ng-icon>
  <span class="font-semibold w-[40px] text-end whitespace-nowrap" [class.text-green-500]="signalStrength() > 60"
        [class.text-yellow-500]="signalStrength() <= 60 && signalStrength() > 10" [class.text-red-500]="signalStrength() <= 10">{{ signalStrength() }}%</span>
</div>
