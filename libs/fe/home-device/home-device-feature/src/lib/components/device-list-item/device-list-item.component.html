<p-card>
    <a
      class="flex flex-row items-center gap-4 cursor-pointer hover:bg-gray-50 rounded no-underline text-inherit focus:outline-none focus-visible:ring-2 focus-visible:ring-primary"
      [routerLink]="['details', deviceId()]"
      [attr.aria-label]="'Przejdź do szczegółów urządzenia ' + deviceName()"
    >
      <sp-device-type [fullLabel]="false" [deviceType]="deviceType()" />
      <div class="flex flex-col gap-2">
        <div class="font-semibold text-gray-700">{{ deviceName() }}</div>
        <div class="text-gray-500">{{ label() }}</div>
      </div>
    </a>
</p-card>
