<div class="flex w-full py-2 justify-between flex-wrap">
  <div>Liczba porcji:</div>
  @if (petFeeder().numberOfPortions) {
    <div class="flex flex-row gap-1 font-semibold">
      <span>{{ petFeeder().numberOfPortions }}</span>
    </div>
  } @else {
    <div>-</div>
  }
</div>

<div class="flex w-full py-2 justify-between flex-wrap">
  <div>Wielkość porcji:</div>
  @if (petFeeder().numberOfPortions) {
    <div class="flex flex-row gap-1 font-semibold">
      <span>{{ petFeeder().portionSize }} g</span>
    </div>
  } @else {
    <div>-</div>
  }
</div>
<div class="w-full flex justify-end">
  <p-button severity="secondary" [outlined]="true" [icon]="'pi pi-cog'" (onClick)="openEditForm()"></p-button>
</div>
