<div class="w-full flex flex-col h-full">
  <sp-page-title [routerLink]="['../']">{{'home.available_devices' | translate}}</sp-page-title>

  <div class="flex flex-row gap-2 justify-center items-center mb-1">
    <input
      type="text"
      pInputText
      fluid="true"
      pSize="large"
      [placeholder]="'home.search_for_device' | translate"
      [formControl]="searchControl"
    />

    <p-button icon="pi pi-plus" [label]="'common.add' | translate" size="large" severity="primary" [routerLink]="['add']"></p-button>
  </div>

  <div class="min-h-[45px] text-end">
    @if (deviceFilter() === deviceType.OPEN_DOOR_SENSOR) {
      <ion-chip>
        <div class="flex flex-row gap-2">
          <span>{{'home.doors_and_windows' | translate}}</span>
          <i class="pi pi-times-circle" (click)="onRemoveFilter()"></i>
        </div>
      </ion-chip>
    }
  </div>
  <div class="flex flex-col h-full justify-between">
    <div class="h-[420px] flex flex-col gap-2">
      @for (device of paginatedDevices(); track device.id) {
        <sp-device-list-item
          @spFadeIn
          [device]="device"
          (deviceEvent)="onDeviceEvent(device.homeDeviceId, $event)"
        ></sp-device-list-item>
      }

      @if (data()?.length === 0) {
        <p-divider></p-divider>
        <span class="w-full text-center">{{'home.no_devices_found' | translate}}</span>
      }
    </div>

    <p-paginator
      [showFirstLastIcon]="false"
      [alwaysShow]="false"
      [rows]="4"
      [totalRecords]="data()?.length"
      (onPageChange)="pagination.set($event)"
    ></p-paginator>
  </div>
</div>
