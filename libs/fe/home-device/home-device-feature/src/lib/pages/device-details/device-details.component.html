@if (deviceDetails(); as homeDevice) {
  <sp-page-title @sparrowFadeIn [routerLink]="['/main']">szczegóły urządzenia</sp-page-title>

  <mat-card @sparrowFadeIn>
    <mat-card-header class="flex justify-between items-center">
      <div mat-card-title>{{ homeDevice.name }}</div>
      @if (switchDevice(); as lcsSwitch) {
        <sp-lcs-switch-manual-control [lcsSwitch]="lcsSwitch" (switchChange)="onLscSwitchChange($event)"></sp-lcs-switch-manual-control>
      }
    </mat-card-header>
    <mat-card-content>
      <div class="flex flex-col gap-2 max-w-[500px]">
        <div class="flex w-full py-2 justify-between">
          <sp-device-type [deviceType]="homeDevice.type"></sp-device-type>
        </div>

        <mat-divider></mat-divider>
        <div class="flex w-full py-2 justify-between">
          <div>Status:</div>
          <div class="flex gap-2 items-center">
            @if (homeDevice.isOnline) {
              <span>Online</span>
              <ng-icon class="text-success" name="heroCheckCircleSolid"></ng-icon>
            } @else {
              <span>Offline</span>
              <ng-icon name="heroNoSymbol"></ng-icon>
            }
          </div>
        </div>

        <mat-divider></mat-divider>
        <div class="flex w-full py-2 justify-between">
          <div>Id urządzenia w sieci:</div>
          <div>{{ homeDevice.homeDeviceId }}</div>
        </div>
      </div>

    </mat-card-content>
  </mat-card>
}
