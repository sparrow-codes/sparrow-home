<div @staggeredFadeIn class="flex flex-col gap-4 w-full max-w-[440px] mx-auto">
  <sp-temperature-panel class="fade-step" [temperature]="avgTemperature()" [isHouseClosed]="isHouseClosed()" />

  <sp-device-list-panel class="fade-step" />

  <p-divider></p-divider>

  <sp-alarm-panel class="fade-step" [isAlarmOn]="isAlarmOn()" [isAlarmAvailable]="isAlarmAvailable()"
                  (isAlarmOnChange)="setAlarm($event)" />

  @for (device of mainDevices(); track device.id) {
    <sp-device-list-item [disableRouting]="true" [device]="device" (deviceEvent)="handleDeviceEvent(device.homeDeviceId, $event)"></sp-device-list-item>
  }


</div>
