<div class="h-[5px]">
  @if (isRefreshing$ | async) {
    <p-progressbar class="animate-fadein" mode="indeterminate" [style]="{ height: '2px' }"></p-progressbar>
  }
</div>
<div class="flex flex-col gap-2 w-full">
  <sp-temperature-panel
    [isLoading]="(isLoading$ | async) ?? false"
    [temperature]="avgTemperature()"
    [isHouseClosed]="isHouseClosed()"
  />

  <sp-device-list-panel [nrOfDevices]="nrOfDevices()" [haveInitialData]="haveInitialData()" [isLoading]="(isLoading$ | async) ?? false" />

  @if (isLoading$ | async) {
    <p-skeleton class="animate-fadein" height="82px" width="100%"></p-skeleton>
    <p-skeleton class="animate-fadein" height="82px" width="100%"></p-skeleton>
    <p-skeleton class="animate-fadein" height="82px" width="100%"></p-skeleton>
  } @else if (haveInitialData()) {
    @if (noDevices() === true) {
      <sp-onboarding
        [title]="'main_panel.welcome' | translate"
        [description]="'main_panel.add_your_first_device' | translate"
        [buttonLabel]="'main_panel.add_first_device' | translate"
        [buttonRouterLink]="'/devices/add'"
      >
        <img src="assets/icons/icon-152x152.png" alt="No Devices" />
      </sp-onboarding>
    } @else {
      @if (isAlarmAvailable()) {
        <sp-alarm-panel [isAlarmOn]="isAlarmOn()" (isAlarmOnChange)="setAlarm($event)" />
      }

      <div class="flex flex-col gap-2">
        @if (mainDevices().length > 0) {
          <span class="text-sm font-bold w-full text-gray-700">{{'main_panel.favorites' | translate}}</span>
          <div class="m-[-1rem]"><p-divider></p-divider></div>
        }

        @for (device of mainDevices(); track device.id) {
          <sp-device-list-item
            [refreshingDevices]="refreshingDevices()"
            [isLoading]="(isRefreshing$ | async) ?? false"
            [routing]="['../devices', 'details', device.id.toString()]"
            [device]="device"
            (deviceEvent)="handleDeviceEvent(device.homeDeviceId, $event)"
          ></sp-device-list-item>

      }
      </div>
    }
  }
</div>
