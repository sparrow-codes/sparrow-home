@if (isLoading()) {
  <p-skeleton class="animate-fadein" height="74px"></p-skeleton>
} @else if (haveInitalData()) {
  <a
    class="animate-fadein flex items-center justify-between bg-white rounded-xl shadow-sm px-4 py-3 w-full cursor-pointer hover:bg-gray-50 transition no-underline"
    [routerLink]="['../', 'devices']"
    [queryParams]="{ deviceType: '' }"
    aria-label="{{ 'main_panel.go_to_devices_list' | translate }}"
  >
    <div class="flex items-center gap-3">
      <div class="w-[50px] h-[50px] bg-gray-700 rounded-md flex items-center justify-center text-white">
        <i class="pi pi-objects-column" style="font-size: 28px"></i>
      </div>
      <div>
        <div class="font-semibold text-gray-700">{{ 'main_panel.manage_devices' | translate }}</div>
        <div class="text-sm text-gray-500">{{ 'main_panel.available_devices' | translate }}</div>
      </div>
    </div>

    <i class="pi pi-chevron-right text-gray-400"></i>
  </a>
}
