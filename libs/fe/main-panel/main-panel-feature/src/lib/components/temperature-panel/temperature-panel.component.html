@if (temperature(); as temperature) {
  <div
    class="relative w-full h-[180px] rounded-xl overflow-hidden shadow-sm bg-cover bg-center"
    style="background-image: url('assets/living-room.png')"
  >
    @if (isHouseClosed() !== null) {
      @if (isHouseClosed()) {
        <div class="absolute bottom-4  bg-white/80 backdrop-blur px-4 py-2 rounded-r text-right">
          <span class="text-sm font-medium text-gray-700">Wszystkie drzwi i okna są zamknięte</span>
        </div>
      } @else {
        <a
          class="absolute bottom-4  bg-white/80 backdrop-blur px-4 py-2 rounded-r text-sm font-medium text-gray-700 hover:bg-white/90 transition no-underline"
          [routerLink]="['../', 'devices']"
          aria-label="Przejdź do listy urządzeń z otwartymi drzwiami i oknami"
        >
          Niektóre drzwi i okna są otwarte
        </a>
      }
    }

    <div class="absolute top-4 right-4 bg-white/50 backdrop-blur px-4 py-2 rounded-lg text-right">
      <div class="text-3xl font-semibold leading-none">
        {{ temperature + ' °C' }}
      </div>
      <div class="text-sm font-medium text-gray-600">Temperatura w domu</div>
    </div>
  </div>
}
