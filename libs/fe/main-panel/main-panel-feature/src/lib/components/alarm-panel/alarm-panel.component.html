<p-card>
  <div class="flex items-center justify-between w-full">
    <div class="flex items-center gap-3">
      <div class="w-[50px] h-[50px] bg-green-400 rounded-md flex items-center justify-center text-white">
        <i class="pi pi-bell" style="font-size: 28px"></i>
      </div>
      <div>
        <div class="font-semibold text-base mb-2">{{ 'main_panel.alarm_home' | translate }}</div>

        @if (isAlarmOn()) {
          <p-tag severity="success">{{ 'main_panel.active' | translate }}</p-tag>
        } @else {
          <p-tag severity="secondary">{{ 'main_panel.inactive' | translate }}</p-tag>
        }

      </div>
    </div>

    <p-toggle-switch [ngModel]="isAlarmOn()" (onChange)="isAlarmOn.set($event.checked)" />
  </div>
</p-card>
