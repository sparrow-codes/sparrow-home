services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${dbName}
      POSTGRES_USER: ${dbUserName}
      POSTGRES_PASSWORD: ${dbPassword}
    ports:
      - "5432:5432"
    volumes:
      - ./home-server/postgres_data:/var/lib/postgresql
    networks: [sparrow]

  mosquitto:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    networks: [sparrow]

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    restart: unless-stopped
    depends_on: [mosquitto]
    env_file: .env
    ports:
      - "8081:8080"
    environment:
      TZ: ${zigbeeTimeZone}
      ZIGBEE2MQTT_MQTT_SERVER: mqtt://mosquitto:1883
      ZIGBEE2MQTT_SERIAL_ADAPTER: ${zigbeeSerialAdapter}
      ZIGBEE2MQTT_SERIAL_PORT: ${zigbeeSerialPort}
      ZIGBEE2MQTT_FRONTEND: "false"
      ZIGBEE2MQTT_PERMIT_JOIN: "false"
      ZIGBEE2MQTT_ADVANCED_NETWORK_KEY: GENERATE
    volumes:
      - ./home-server/zigbee2mqtt/data:/app/data
    devices:
      - "${zigbeeSerialPort}:${zigbeeSerialPort}"
    user: "0:0"
    networks: [sparrow]

  backend:
    image: ghcr.io/sparrow-codes/sparrow-backend:current
    restart: unless-stopped
    depends_on: [postgres, mosquitto, zigbee2mqtt]
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      mode: ${mode}
      dbHost: postgres
      dbPort: 5432
      dbName: ${dbName}
      dbUserName: ${dbUserName}
      dbPassword: ${dbPassword}
      jwtSecret: ${jwtSecret}
      jwtExpiry: ${jwtExpiry}
      mqttUrl: mqtt://mosquitto
      pushPublicKey: ${pushPublicKey}
      pushPrivateKey: ${pushPrivateKey}
      pushAdminEmail: ${pushAdminEmail}
    volumes:
      - ./home-server/backend/data:/app/data
    networks: [sparrow]

  frontend:
    image: ghcr.io/sparrow-codes/sparrow-frontend:current
    restart: unless-stopped
    depends_on: [backend]
    user: "0:0"
    environment:
      TAILSCALE_DOMAIN: ${tailscaleDomain:?tailscaleDomain must be set}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config.json:/usr/share/caddy/config.json:ro
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    networks: [sparrow]

networks:
  sparrow:
    driver: bridge
