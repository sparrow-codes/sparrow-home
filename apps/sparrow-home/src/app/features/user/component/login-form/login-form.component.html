<form [formGroup]="formGroup" class="w-[450px] flex flex-col gap-6">
  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput [formControlName]="formName.EMAIL">
  </mat-form-field>

  <mat-form-field>
    <mat-label>Password</mat-label>
    <input matInput type="password" [formControlName]="formName.PASSWORD">
    @if(showInvalidLoginError()) {
      <mat-error>Niepoprawny login lub hasło!</mat-error>
    }
  </mat-form-field>

  <button mat-button [disabled]="showInvalidLoginError()" (click)="onLoginClick()">
    <div class="flex justify-center gap-2 items-center">
      <span>Login</span>
      <ng-icon name="heroLockOpen"></ng-icon>
    </div>
  </button>
</form>
