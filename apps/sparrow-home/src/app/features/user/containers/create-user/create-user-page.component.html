<div class="w-full h-full flex items-center justify-center bg-super-light-gray">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ appTitle }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <span class="text-md mb-2 mt-2 block">Utwórz nowego użytkownika, aby rozpocząć:</span>
      <app-create-user-form (formSave)="dataService.createFirstUser($event)"></app-create-user-form>
    </mat-card-content>
  </mat-card>
</div>
