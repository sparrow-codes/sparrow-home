<div class="w-full h-full flex items-center justify-center bg-super-light-gray">
  <div @sparrowFadeIn class="w-[300px] md:w-[450px]">
    <sp-app-logo [type]="'horizontal'"></sp-app-logo>
    <mat-card class="mt-[-25px]">

      <app-login-form
        [hasError]="dataService.isLoginError()"
        (login)="dataService.login($event)"
      ></app-login-form>
    </mat-card>
  </div>
</div>
