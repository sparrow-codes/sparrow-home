<div @sparrowFadeIn class="w-full h-full flex items-center justify-center">
  <sp-card>
    <h4 class="text-xl text-primary text-center mb-2">{{ appTitle }}</h4>
    <span class="text-md">Logowanie</span>
    <app-login-form
      [hasError]="dataService.isLoginError()"
      (onLogin)="dataService.login($event)"
    ></app-login-form>
  </sp-card>
</div>
