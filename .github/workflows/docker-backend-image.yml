name: BACKEND - APPLICATION IMAGE

on:
  push:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

jobs:
  build_backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version + short sha
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Determine image label from branch
        id: image_label
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH" = "main" ]; then
            echo "label=current" >> "$GITHUB_OUTPUT"
          else
            echo "label=next" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./home-server/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/sparrow-backend:${{ steps.image_label.outputs.label }}
            ghcr.io/${{ github.repository_owner }}/sparrow-backend:${{ steps.meta.outputs.version }}-${{ steps.image_label.outputs.label }}.sha-${{ steps.meta.outputs.short_sha }}
