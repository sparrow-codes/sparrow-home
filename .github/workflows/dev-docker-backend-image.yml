name: Publish NEXT (develop)

on:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write

jobs:
  build_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version + short sha
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: github/workflows/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sparrow-backend:next
            ghcr.io/${{ github.repository_owner }}/sparrow-backend:${{ steps.meta.outputs.version }}-dev.sha-${{ steps.meta.outputs.short_sha }}

  # analogicznie drugi job dla frontendu (albo w tym samym)
